# Description: This workflow runs test suite against PRs that are not from forks.
#
# Triggered by:
#   (1) Opening a pull request
#   (2) On every commit to the PR
#   (3) Adding run-tests label to the PR

name: Test / Internal PRs

concurrency:
  group: test-internal-prs-${{ github.event.pull_request.id }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main, hotfix]
    types: [opened, synchronize, labeled]

jobs:
  setup:
    runs-on: ubuntu-latest
    # We run tests only if
    #   (1) this pr is not from a fork, and
    #   (2) it's either 'opened' or 'synchronize' action or 'labeled' action with 'run-tests' label.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository && (
        github.event.action == 'opened' ||  
        github.event.action == 'synchronize' || 
        (github.event.action == 'labeled' && github.event.label.name == 'run-tests')
      )
    permissions:
      pull-requests: write # used to remove label
      statuses: write # This is required for running set-status actions
    steps:
      - name: Remove run-tests label, if applicable
        if: github.event.label.name == 'run-tests'
        env:
          ISSUE_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          LABEL_NAME: 'run-tests'
        uses: actions/github-script@d746ffe35508b1917358783b479e04febd2b8f71 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { ISSUE_NUMBER, REPO_OWNER, REPO_NAME, LABEL_NAME } = process.env
            github.rest.issues.removeLabel({ owner: REPO_OWNER, repo: REPO_NAME, issue_number: ISSUE_NUMBER, name: LABEL_NAME })
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set status to commit sha
        uses: ./.github/actions/set-status
        with:
          sha: ${{ github.event.pull_request.head.sha }}
          state: 'pending'
          context: 'Run PR checks'
          description: 'PR checks are now running'
          # URL below is a link to the current workflow run to allow users to see the status of the workflow.
          target-url: https://github.com/${{ github.event.repository.owner.login }}/${{ github.event.repository.name }}/actions/runs/${{ github.run_id }}

  dependency-review:
    runs-on: ubuntu-latest
    needs: setup
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          config-file: '.github/dependency-review/config.yml'

  # Fork-only delta from upstream:
  # The upstream PR workflow carries an inline CodeQL job here. This fork relies
  # on GitHub CodeQL default setup instead, because GitHub rejects a second
  # workflow-based CodeQL upload for the same language while default setup is
  # enabled. If syncing this file back to upstream, restore upstream's CodeQL job
  # or disable default setup before reintroducing an advanced CodeQL job here.

  setup-cache:
    needs: setup
    uses: ./.github/workflows/reusable-setup-cache.yml
    with:
      commit: ${{ github.event.pull_request.head.sha }}
      repository: ${{ github.repository }}

  unit:
    uses: ./.github/workflows/reusable-unit.yml
    needs: setup-cache
    with:
      commit: ${{ github.event.pull_request.head.sha }}
      repository: ${{ github.repository }}

  e2e:
    # Fork-only delta from upstream:
    # Upstream can run AWS-backed e2e because aws-amplify/amplify-ui owns the
    # private Amplify apps, OIDC roles, and e2e secrets used by reusable-e2e.yml.
    # This fork does not, so e2e is skipped unless equivalent AWS infrastructure
    # is configured and this repository guard is intentionally relaxed.
    if: github.repository == 'aws-amplify/amplify-ui'
    uses: ./.github/workflows/reusable-e2e.yml
    needs: unit
    with:
      commit: ${{ github.event.pull_request.head.sha }}
      repository: ${{ github.event.pull_request.head.repo.full_name }}
    permissions:
      id-token: write # This is required for requesting the JWT
    secrets:
      AUTH_E2E_ROLE_ARN: ${{ secrets.AUTH_E2E_ROLE_ARN }}
      DATASTORE_E2E_ROLE_ARN: ${{ secrets.DATASTORE_E2E_ROLE_ARN }}
      GEO_E2E_ROLE_ARN: ${{ secrets.GEO_E2E_ROLE_ARN }}
      STORAGE_E2E_ROLE_ARN: ${{ secrets.STORAGE_E2E_ROLE_ARN }}
      LIVENESS_E2E_ROLE_ARN: ${{ secrets.LIVENESS_E2E_ROLE_ARN }}
      IN_APP_MESSAGING_E2E_ROLE_ARN: ${{ secrets.IN_APP_MESSAGING_E2E_ROLE_ARN }}
      AI_E2E_ROLE_ARN: ${{ secrets.AI_E2E_ROLE_ARN }}
      DOMAIN: ${{ secrets.DOMAIN }}
      PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
      USERNAME: ${{ secrets.USERNAME }}
      NEW_PASSWORD: ${{ secrets.NEW_PASSWORD }}
      VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
      SITE_URL: ${{ secrets.SITE_URL }}
      DOCSEARCH_DOCS_APP_ID: ${{ secrets.DOCSEARCH_DOCS_APP_ID }}
      DOCSEARCH_DOCS_API_KEY: ${{ secrets.DOCSEARCH_DOCS_API_KEY }}
      DOCSEARCH_DOCS_INDEX_NAME: ${{ secrets.DOCSEARCH_DOCS_INDEX_NAME }}

  e2e-skip:
    # Keep the aggregate "Run PR checks" status meaningful in forks: unit and
    # dependency checks still run, but AWS-backed e2e is represented by this
    # explicit skip path instead of failing on missing private AWS credentials.
    if: github.repository != 'aws-amplify/amplify-ui'
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - name: Skip AWS-backed e2e checks
        run: echo "Skipping e2e checks because this repository does not provide AWS e2e role secrets."

  update-success-status:
    # e2e is skipped in forks, so use result-aware conditions instead of
    # success(). Skipped fork e2e should not block success, but actual failures
    # or cancellations should still publish a failure status.
    if: ${{ always() && needs.setup.result == 'success' && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    needs: [setup, e2e, e2e-skip, dependency-review]
    runs-on: ubuntu-latest
    permissions:
      statuses: write # This is required for running set-status actions
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Update status when tests are successful
        uses: ./.github/actions/set-status
        with:
          sha: ${{ github.event.pull_request.head.sha }}
          state: 'success'
          context: 'Run PR checks'
          description: 'PR checks have finished running'
          target-url: https://github.com/${{ github.event.repository.owner.login }}/${{ github.event.repository.name }}/actions/runs/${{ github.run_id }}

  update-failure-status:
    # Do not set a failure status when setup was skipped because the PR event did
    # not meet this workflow's trigger rules. Real downstream failures are still
    # reported on the PR commit.
    if: ${{ always() && needs.setup.result != 'skipped' && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    needs: [setup, e2e, e2e-skip, dependency-review]
    runs-on: ubuntu-latest
    permissions:
      statuses: write # This is required for running set-status actions
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Update status when tests are not successful
        uses: ./.github/actions/set-status
        with:
          sha: ${{ github.event.pull_request.head.sha }}
          state: 'failure'
          context: 'Run PR checks'
          description: 'PR checks have failed'
          target-url: https://github.com/${{ github.event.repository.owner.login }}/${{ github.event.repository.name }}/actions/runs/${{ github.run_id }}
