name: Publish to GitHub Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.repository == 'saasontools/amplify-ui'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'yarn'
          registry-url: https://npm.pkg.github.com
          scope: '@saasontools'
        env:
          SEGMENT_DOWNLOAD_TIMEOUT_MINS: 2

      - name: Install packages
        run: yarn install --frozen-lockfile --network-timeout 60000
        env:
          CYPRESS_INSTALL_BINARY: 0

      - name: Build published packages
        run: yarn build:published

      - name: Test published packages
        run: yarn test:published

      - name: Publish via changesets
        run: yarn changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
